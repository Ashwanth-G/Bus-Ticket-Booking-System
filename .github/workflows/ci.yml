name: SmartBus CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx prisma generate --schema=src/prisma/schema.prisma

      - run: npm test

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

  docker:
    needs:
      - backend
      - frontend

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/smartbus-server:latest \
            ./server

      - name: Push Backend Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/smartbus-server:latest

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/smartbus-client:latest \
            ./client

      - name: Push Frontend Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/smartbus-client:latest