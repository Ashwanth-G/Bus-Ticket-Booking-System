name: SmartBus CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: smartbus_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/smartbus_db

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=src/prisma/schema.prisma

      - name: Push Schema to Database
        run: npx prisma db push --schema=src/prisma/schema.prisma

      - name: Seed Database
        run: npm run db:seed

      - name: Run Backend Tests
        run: npm test

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

  docker:
    needs:
      - backend
      - frontend

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/smartbus-server:latest \
            ./server

      - name: Push Backend Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/smartbus-server:latest

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/smartbus-client:latest \
            ./client

      - name: Push Frontend Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/smartbus-client:latest